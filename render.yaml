services:
  - type: web
    name: wavechat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 100 -b 0.0.0.0:$PORT wsgi:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DEV_OTP_EXPOSE
        value: "false"
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/chat.db
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/data/uploads
      - key: RTC_STUN_URLS
        value: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      - key: RTC_TURN_URLS
        value: ""
      - key: RTC_TURN_USERNAME
        value: ""
      - key: RTC_TURN_CREDENTIAL
        sync: false
      - key: RTC_ICE_TRANSPORT_POLICY
        value: all
    disk:
      name: wavechat-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
